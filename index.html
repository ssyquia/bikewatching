<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bikewatching</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="global.css?v=3" />
    <link rel="stylesheet" href="map.css?v=3" />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="config.js"></script>
    <script src="map.js?v=3" type="module"></script>
  </head>
  <body>
    <header>
      <div>
        <h1>Bikewatching</h1>
        <p>
          Boston-area Bluebikes stations, bike lanes, and traffic flow by time
          of day.
        </p>
      </div>

      <label class="time-filter">
        <span>Filter by time:</span>
        <input id="time-slider" type="range" min="-1" max="1440" value="-1" />
        <time id="selected-time"></time>
        <em id="any-time">(any time)</em>
      </label>
    </header>

    <main>
      <div id="map" aria-label="Interactive map of Boston bike traffic">
        <svg aria-hidden="true"></svg>
        <div id="station-tooltip" role="status" hidden></div>
        <div id="token-message" hidden>
          Add your Mapbox public token in <code>config.js</code>, or run
          <code>localStorage.setItem('mapboxToken', 'pk...')</code> in the
          console and refresh.
        </div>
        <div id="loading-message">Loading bike traffic data...</div>
      </div>

      <div class="legend" aria-label="Traffic flow legend">
        <strong>Legend:</strong>
        <div style="--departure-ratio: 1">More departures</div>
        <div style="--departure-ratio: 0.5">Balanced</div>
        <div style="--departure-ratio: 0">More arrivals</div>
      </div>
    </main>
  </body>
</html>
